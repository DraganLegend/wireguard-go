[Interface]
# 你的私钥，确保这里没有多余的空格或换行
PrivateKey = YIyOMstxOnHNTOMFhgeGBzVSEOwbtQeOahrxnqoMemo=
# 分配给此接口的 IP 地址（可根据需要修改）
Address = 10.0.0.3/24
# 监听端口（默认为 51820，可以自行更改）
ListenPort = 51820

[Peer]
# 对端的公钥（你需要从对端获取）
PublicKey = ENjv0MVeU8+w4TvP6T9ubeUZTBYXx+ZqTMm/DwHSlTw=
# 允许通过 VPN 传输的数据 IP 范围（例如 0.0.0.0/0 表示所有流量）
AllowedIPs = 0.0.0.0/0
# 对端的实际 IP 与端口
Endpoint = 192.168.30.6:51820
